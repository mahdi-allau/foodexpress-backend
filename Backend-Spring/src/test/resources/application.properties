# Configurazione di TEST: database H2 in-memory (non serve MySQL).
spring.datasource.url=jdbc:h2:mem:foodexpress;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.jwt.secret=TestSecretKeyFoodExpress1234567890ABCDEF
app.jwt.expiration=86400000

app.geocoding.base-url=https://nominatim.openstreetmap.org
app.geocoding.user-agent=FoodExpress-Test/1.0
app.restaurant.lat=44.8381
app.restaurant.lon=11.6198
