# ── Integrazione REST esterna: geocoding Nominatim (OpenStreetMap) ───────────
# Servizio gratuito senza chiave. Converte l'indirizzo di consegna in coordinate
# per stimare distanza, costo e tempo di consegna. Fallback se non raggiungibile.
app.geocoding.base-url=https://nominatim.openstreetmap.org
app.geocoding.user-agent=FoodExpress/1.0 (progetto universitario)
